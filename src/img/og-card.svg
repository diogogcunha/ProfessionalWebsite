<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Diogo G. Cunha – Engineering Consultancy in Portugal">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="5" height="470" rx="2.5" fill="url(#accent)" opacity="0.9"/>

  <!-- DG monogram badge -->
  <rect x="112" y="210" width="160" height="160" rx="24" fill="#374151" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
  <text x="192" y="310" text-anchor="middle" dominant-baseline="middle" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" fill="#f9fafb">DG</text>

  <!-- Name -->
  <text x="320" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="700" fill="#f9fafb" letter-spacing="-1">Diogo G. Cunha</text>

  <!-- Role -->
  <text x="322" y="318" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="400" fill="#a5b4fc" letter-spacing="0.5">Engineering Executive &amp; Consultant</text>

  <!-- Divider -->
  <rect x="320" y="350" width="780" height="1.5" fill="#ffffff" opacity="0.12"/>

  <!-- Service pills -->
  <rect x="320" y="372" width="220" height="42" rx="21" fill="#6366f1" opacity="0.2"/>
  <text x="430" y="399" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#a5b4fc">Tech Hub Creation</text>

  <rect x="556" y="372" width="190" height="42" rx="21" fill="#6366f1" opacity="0.2"/>
  <text x="651" y="399" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#a5b4fc">Fractional CTO</text>

  <rect x="762" y="372" width="220" height="42" rx="21" fill="#6366f1" opacity="0.2"/>
  <text x="872" y="399" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#a5b4fc">Eng. Mentorship</text>

  <!-- Bottom tagline -->
  <text x="320" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="400" fill="#9ca3af" letter-spacing="0.3">Portugal · Europe · Global</text>

  <!-- Decorative circle (top-right) -->
  <circle cx="1100" cy="120" r="180" fill="#6366f1" opacity="0.05"/>
  <circle cx="1100" cy="120" r="120" fill="#6366f1" opacity="0.05"/>

  <!-- Decorative circle (bottom-right) -->
  <circle cx="1120" cy="580" r="100" fill="#8b5cf6" opacity="0.08"/>
</svg>
